services:
  - type: web
    name: seoulai-policy-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TIMEZONE
        value: Asia/Seoul
      - key: SCRAPE_FILTER_HMPG_NM
        value: 정부부처·청·위원회
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TIMEOUT
        value: "60000"
      - key: PAGE_LOAD_DELAY
        value: "4"
      - key: ARTICLE_FETCH_DELAY
        value: "3"
